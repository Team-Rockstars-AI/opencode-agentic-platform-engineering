name: "✨ Feature request"
description: Suggest an enhancement, new module, template, or skill
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: Thanks for the idea! Describe the problem first, then your proposed solution.
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do that is hard or impossible today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should the scaffold, template, module, or skill do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Scaffold / templates
        - Terraform modules
        - Bicep modules
        - OpenCode config / agents / skills
        - select-models tooling
        - CI / workflows
        - Documentation
        - Other
    validations:
      required: true
