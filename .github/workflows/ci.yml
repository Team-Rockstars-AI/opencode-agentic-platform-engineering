name: CI

# Continuous integration for the platform-engineering scaffold repo.
# Validates the Python tooling, the OpenCode skill references, repo config
# files, and the Terraform that ships in modules/ and templates/.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege by default; jobs opt into more where needed.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python lint & skill validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff
          pip install -r requirements.txt

      - name: Ruff lint
        run: ruff check .

      - name: Byte-compile all Python
        run: python -m compileall -q scripts agent_config.py templates

      - name: Validate OpenCode skill references
        run: python3 scripts/validate-skills.py

      - name: Validate team consistency
        run: python3 scripts/validate-team.py

  config:
    name: Config validation (JSON/YAML)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install PyYAML
        run: pip install -r requirements.txt

      - name: Validate JSON and YAML files
        run: |
          python - <<'PY'
          import json, sys, pathlib
          import yaml

          errors = []
          root = pathlib.Path(".")
          # templates/ intentionally contains {{placeholder}} tokens (scaffold
          # inputs), so it is not valid standalone JSON/YAML and is skipped here.
          skip = {".git", "node_modules", "__pycache__", ".sisyphus", "templates"}

          def skipped(p: pathlib.Path) -> bool:
              return any(part in skip for part in p.parts)

          for path in root.rglob("*.json"):
              if skipped(path):
                  continue
              try:
                  json.loads(path.read_text(encoding="utf-8"))
              except Exception as exc:  # noqa: BLE001
                  errors.append(f"JSON  {path}: {exc}")

          for path in list(root.rglob("*.yml")) + list(root.rglob("*.yaml")):
              if skipped(path):
                  continue
              try:
                  list(yaml.safe_load_all(path.read_text(encoding="utf-8")))
              except Exception as exc:  # noqa: BLE001
                  errors.append(f"YAML  {path}: {exc}")

          if errors:
              print("Invalid config files:")
              print("\n".join(errors))
              sys.exit(1)
          print("All JSON/YAML config files parsed successfully.")
          PY

  terraform:
    name: Terraform format check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.9.5"

      # Scope to the reusable modules. templates/terraform contains
      # {{placeholder}} tokens (resolved at scaffold time) that are not valid
      # HCL, so it is excluded from the format gate.
      - name: terraform fmt -check (modules)
        run: terraform fmt -check -recursive -diff modules

  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          version="8.21.2"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${version}/gitleaks_${version}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run gitleaks
        run: gitleaks detect --source . --redact --no-banner --verbose

  packs:
    name: Team pack governance
    runs-on: ubuntu-latest
    if: ${{ env.TEAM_PACKS_VALIDATE == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate Agent Team Packs
        run: |
          set -euo pipefail
          python3 scripts/team_packs.py list
          python3 scripts/team_packs.py validate --all
