# Agentic Configuration Manifest for EU-Sovereign Platform Engineering
# This manifest defines the active agents, their roles, and their model endpoints.
# All non-EU model endpoints (US/China) have been replaced with EU-sovereign alternatives
# (Mistral API or local Ollama endpoints) except for the high-reasoning fallback orchestrator.

version: "1.0.0"
jurisdiction_policy: "EU-Sovereign"

agents:
  orchestrator:
    name: "orchestrator"
    role: "Strategic Platform Planner"
    # Claude 4 is maintained as the 'High-Reasoning' fallback for complex orchestration
    model: "anthropic/claude-4"
    endpoint: "https://api.anthropic.com/v1"
    jurisdiction: "US"
    tier: "High-Reasoning"

  builder-infra-tf:
    name: "builder-infra-tf"
    role: "Code-Generation"
    # Replaced US/China models with Mistral Codestral-24b (EU-sovereign)
    model: "mistral/codestral-24b"
    endpoint: "https://api.mistral.ai/v1"
    jurisdiction: "EU"
    tier: "Code-Generation"

  builder-infra-bicep:
    name: "builder-infra-bicep"
    role: "Code-Generation"
    # Replaced US/China models with Mistral Codestral-24b (EU-sovereign)
    model: "mistral/codestral-24b"
    endpoint: "https://api.mistral.ai/v1"
    jurisdiction: "EU"
    tier: "Code-Generation"

  builder-pipelines:
    name: "builder-pipelines"
    role: "Code-Generation"
    # Replaced US/China models with local Ollama Ministral-8b (EU-sovereign)
    model: "ollama/ministral-8b"
    endpoint: "http://localhost:11434/v1"
    jurisdiction: "EU"
    tier: "Code-Generation"

  verifier:
    name: "verifier"
    role: "Task-Execution"
    # Replaced US/China models with local Ollama Ministral-8b (EU-sovereign)
    model: "ollama/ministral-8b"
    endpoint: "http://localhost:11434/v1"
    jurisdiction: "EU"
    tier: "Task-Execution"

  security-auditor:
    name: "security-auditor"
    role: "Task-Execution"
    # Replaced US/China models with Mistral Codestral-24b (EU-sovereign)
    model: "mistral/codestral-24b"
    endpoint: "https://api.mistral.ai/v1"
    jurisdiction: "EU"
    tier: "Task-Execution"

  plan-validator:
    name: "plan-validator"
    role: "Task-Execution"
    # Replaced US/China models with local Ollama Ministral-8b (EU-sovereign)
    model: "ollama/ministral-8b"
    endpoint: "http://localhost:11434/v1"
    jurisdiction: "EU"
    tier: "Task-Execution"

  code-reviewer:
    name: "code-reviewer"
    role: "Task-Execution"
    # Replaced US/China models with local Ollama Ministral-8b (EU-sovereign)
    model: "ollama/ministral-8b"
    endpoint: "http://localhost:11434/v1"
    jurisdiction: "EU"
    tier: "Task-Execution"
